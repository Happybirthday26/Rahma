<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة متأخرة شوية!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* خلفية بألوان مبهجة وتدرج لوني */
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 400px;
            position: relative;
            z-index: 10;
        }

        /* زرار البداية */
        #startBtn {
            background-color: #ff6b81;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, background-color 0.3s;
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.4);
        }

        #startBtn:hover {
            transform: scale(1.05);
            background-color: #ff4757;
        }

        /* المحتوى المخفي اللي هيظهر */
        #birthdayContent {
            display: none;
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #ff4757;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        p {
            color: #2f3542;
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* تنسيق البالونات اللي هتطير في الخلفية */
        .balloon {
            position: absolute;
            bottom: -100px;
            width: 40px;
            height: 50px;
            background-color: #ffcc00;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            animation: floatUp linear infinite;
            z-index: 1;
            opacity: 0.8;
        }

        /* حبل البالونة */
        .balloon::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            width: 2px;
            height: 20px;
            background-color: rgba(0,0,0,0.2);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-120vh) rotate(20deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <button id="startBtn">عندي ليكي سر متأخر يومين.. اضغطي هنا!</button>

        <div id="birthdayContent">
            <h1>كل سنة وأنتي طيبة يا رحمة! 🎉</h1>
            <p>
                يمكن اتأخرت يومين، بس أمنياتي ليكي بالسعادة ملهاش وقت. يا رب أيامك الجاية كلها تكون مبهجة زي روحك الحلوة. <br><br>
                شكراً إنك دايماً الصديقة اللي برتاح أفضفض معاها، واللي بحب أرخم عليها كمان! 😂 <br><br>
                Happy Belated Birthday! 🎉
            </p>
        </div>
    </div>

    <script>
        document.getElementById('startBtn').addEventListener('click', function() {
            // إخفاء الزرار
            this.style.display = 'none';
            
            // إظهار الرسالة
            document.getElementById('birthdayContent').style.display = 'block';

            // تشغيل البالونات
            createBalloons();
        });

        function createBalloons() {
            const colors = ['#ff6b81', '#1e90ff', '#2ed573', '#ffa502', '#9b59b6'];
            
            // عمل 15 بالونة
            for(let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const balloon = document.createElement('div');
                    balloon.classList.add('balloon');
                    
                    // اختيار لون عشوائي
                    balloon.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    
                    // مكان عشوائي على الشاشة
                    balloon.style.left = Math.random() * 100 + 'vw';
                    
                    // سرعة عشوائية
                    balloon.style.animationDuration = (Math.random() * 3 + 4) + 's';
                    
                    document.body.appendChild(balloon);
                    
                    // مسح البالونة بعد ما تطلع بره الشاشة عشان المتصفح ميبقاش تقيل
                    setTimeout(() => {
                        balloon.remove();
                    }, 7000);
                }, i * 300); // تأخير بسيط بين كل بالونة والتانية
            }
        }
    </script>
</body>
</html>
